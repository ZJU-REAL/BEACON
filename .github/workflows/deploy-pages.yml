# Deploy static content from pages/ directory to GitHub Pages
name: Deploy Static Site to Pages

on:
  push:
    branches: ["master"]
    paths: ["pages/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, do not cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy pages content to _site
        run: |
          mkdir -p _site
          cp -r pages/* _site/
          # Carry the .nojekyll file so GitHub Pages does not run Jekyll.
          if [ -f pages/.nojekyll ]; then cp pages/.nojekyll _site/.nojekyll; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
